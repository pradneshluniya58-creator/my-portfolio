<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7928CA" />
      <stop offset="100%" stop-color="#FF0080" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Circle with Gradient and Glow -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#bg-grad)" stroke-width="2.5" filter="url(#glow)" />
  
  <!-- Outer Ring Background -->
  <circle cx="50" cy="50" r="45" fill="#0D0E15" />
  
  <!-- Stylized Initials / Avatar Symbol -->
  <g transform="translate(0, 0)">
    <!-- Head / Circle -->
    <circle cx="50" cy="40" r="14" fill="url(#bg-grad)" opacity="0.9" />
    
    <!-- Body / Shoulders -->
    <path d="M22,76 C22,60 30,58 50,58 C70,58 78,60 78,76 C78,78 76,80 74,80 L26,80 C24,80 22,78 22,76 Z" fill="url(#bg-grad)" opacity="0.85" />
  </g>

  <!-- Inner Sparkle/Accent -->
  <circle cx="36" cy="30" r="1.5" fill="#00DF89" filter="url(#glow)" />
  <circle cx="65" cy="48" r="1" fill="#00DF89" />
</svg>
